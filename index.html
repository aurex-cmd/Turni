function dec(b){return new TextDecoder().decode(Uint8Array.from(atob(b),function(c){return c.charCodeAt(0);}));}
document.getElementById('f-ed').srcdoc=dec(ED);
document.getElementById('f-gen').srcdoc=dec(GEN);
document.getElementById('f-rd').srcdoc=dec(RD);
var frames={ed:'f-ed',gen:'f-gen',rd:'f-rd'};
window.switchTab=function(t){
  var b=document.querySelectorAll('.tab');for(var i=0;i<b.length;i++)b[i].classList.toggle('active',b[i].dataset.tab===t);
  var f=document.querySelectorAll('.frame');for(var j=0;j<f.length;j++)f[j].classList.remove('active');
  var fr=document.getElementById(frames[t]);fr.classList.add('active');
  if(t==='gen'){try{fr.contentWindow.applySharedConfig&&fr.contentWindow.applySharedConfig();}catch(e){}}
};
var tb=document.querySelectorAll('.tab');for(var k=0;k<tb.length;k++)tb[k].addEventListener('click',function(e){window.switchTab(e.target.dataset.tab);});
</script>
